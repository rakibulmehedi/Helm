name: helm
description: "Freelancer cashflow clarity for USD earners in Bangladesh."
publish_to: 'none'

version: 0.4.0-beta.1+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  hive_ce: 2.19.3
  hive_ce_flutter: 2.3.4
  shared_preferences: 2.2.2
  path_provider: ^2.1.2
  path: ^1.9.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  go_router: ^17.3.0
  crypto: 3.0.3
  share_plus: ^13.1.0
  flutter_local_notifications: ^22.0.0
  timezone: ^0.11.0
  flutter_secure_storage: 10.3.1
  local_auth: ^3.0.1
  jailbreak_root_detection: ^1.1.1
  http: ^1.6.0
  supabase_flutter: ^2.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_ce_generator: 1.11.2
  build_runner: ^2.15.0
  flutter_lints: ^6.0.0
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8

flutter:
  uses-material-design: true

  generate: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/JetBrainsMono-SemiBold.ttf
          weight: 600
    - family: HindSiliguri
      fonts:
        - asset: assets/fonts/HindSiliguri-Regular.ttf
          weight: 400
        - asset: assets/fonts/HindSiliguri-Medium.ttf
          weight: 500
