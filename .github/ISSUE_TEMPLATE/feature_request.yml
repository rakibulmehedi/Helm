name: Feature Request
description: Suggest a new feature or improvement aligned with Pocketa's mission
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "Feature requests must align with [POCKETA_BRAIN.md](../docs/core/POCKETA_BRAIN.md). Read it before submitting."
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve for freelancers managing unstable income?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've thought about
  - type: checkboxes
    id: alignment
    attributes:
      label: Product Alignment
      options:
        - label: I have read POCKETA_BRAIN.md and this request aligns with the product mission
          required: true
